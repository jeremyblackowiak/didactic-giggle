name: "Demo Reusable Workflow B"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (dev, staging, prod)"
      node-version:
        required: false
        type: string
        default: '18'
        description: "Node.js version to use"
    secrets:
      deployment-token:
        required: true
        description: "Token used for deployment"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Run tests
        run: npm test
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: dist/
          
  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-files
          path: dist/
          
      - name: Configure deployment credentials
        run: echo "Setting up credentials for ${{ inputs.environment }}"
        
      - name: Deploy to environment
        run: |
          echo "Deploying to ${{ inputs.environment }} environment"
          echo "Using secret token: ${{ secrets.deployment-token != '' && '***' || 'Not provided' }}"
          
      - name: Verify deployment
        run: echo "Verifying deployment health checks..."
        
      - name: Send notification
        if: always()
        run: echo "Sending deployment ${{ job.status }} notification"